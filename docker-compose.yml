services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: cappycloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cappy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cappypass}
      POSTGRES_DB: ${POSTGRES_DB:-cappycloud}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - cappycloud_net
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cappy} -d ${POSTGRES_DB:-cappycloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: cappycloud-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cappyneo4j}
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
    networks:
      - cappycloud_net
    ports:
      - "${NEO4J_BOLT_PORT:-17687}:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  code-indexer:
    build:
      context: .
      dockerfile: services/code-indexer/Dockerfile
    container_name: cappycloud-code-indexer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cappy}:${POSTGRES_PASSWORD:-cappypass}@postgres:5432/${POSTGRES_DB:-cappycloud}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-cappyneo4j}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cappycloud_net
    ports:
      - "${INDEXER_PORT:-38090}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: cappycloud-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - cappycloud_net
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sandbox:
    build:
      context: .
      dockerfile: services/sandbox/Dockerfile
    container_name: cappycloud-sandbox
    restart: unless-stopped
    environment:
      CLAUDE_CODE_USE_OPENAI: "1"
      OPENAI_BASE_URL: https://openrouter.ai/api/v1
      OPENAI_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      ENV_SLUG: default
      WORKSPACE_REPO: ${WORKSPACE_REPO:-}
      WORKSPACE_BRANCH: main
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: ${SANDBOX_GRPC_PORT:-50051}
      GIT_AUTH_TOKEN: ${GIT_AUTH_TOKEN:-}
      CODE_INDEXER_URL: http://code-indexer:8000
    networks:
      - cappycloud_net
    depends_on:
      - code-indexer

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: cappycloud-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cappy}:${POSTGRES_PASSWORD:-cappypass}@postgres:5432/${POSTGRES_DB:-cappycloud}
      PIPELINE_DATABASE_URL: postgresql://${POSTGRES_USER:-cappy}:${POSTGRES_PASSWORD:-cappypass}@postgres:5432/${POSTGRES_DB:-cappycloud}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_jwt_secret_64_hex}
      # UI Nginx (WEB_PORT) + Vite local (5173)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:${WEB_PORT:-38081},http://127.0.0.1:${WEB_PORT:-38081},http://localhost:5173,http://127.0.0.1:5173}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      SANDBOX_HOST: cappycloud-sandbox
      SANDBOX_GRPC_PORT: ${SANDBOX_GRPC_PORT:-50051}
      SANDBOX_IDLE_TIMEOUT: ${SANDBOX_IDLE_TIMEOUT:-1800}
      GIT_AUTH_TOKEN: ${DEVOPS_TOKEN:-}
      WORKSPACE_REPO: ${WORKSPACE_REPO:-}
      REDIS_URL: redis://redis:6379
      CODE_INDEXER_URL: http://code-indexer:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cappycloud_net
    # API escuta em 8080 no container; no host usa outra porta (ex.: 38000), não 8000
    ports:
      - "${API_PORT:-38000}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      code-indexer:
        condition: service_started
      sandbox:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: cappycloud-web
    restart: unless-stopped
    # Nginx serve a SPA na porta 80 *dentro* do container; no host usa `WEB_PORT` (não 80)
    ports:
      - "${WEB_PORT:-38081}:80"
    networks:
      - cappycloud_net
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  neo4j_data:

networks:
  cappycloud_net:
    name: cappycloud_net
    driver: bridge
