services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: cappycloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cappy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cappypass}
      POSTGRES_DB: ${POSTGRES_DB:-cappycloud}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - cappycloud_net
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cappy} -d ${POSTGRES_DB:-cappycloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cappycloud-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - cappycloud_net
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sandbox:
    build:
      context: services/sandbox
      dockerfile: Dockerfile
    container_name: cappycloud-sandbox
    restart: unless-stopped
    environment:
      CLAUDE_CODE_USE_OPENAI: "1"
      OPENAI_BASE_URL: https://openrouter.ai/api/v1
      OPENAI_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: ${SANDBOX_GRPC_PORT:-50051}
      SESSION_SERVER_PORT: "8080"
    volumes:
      - repos_data:/repos
    networks:
      - cappycloud_net

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: cappycloud-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cappy}:${POSTGRES_PASSWORD:-cappypass}@postgres:5432/${POSTGRES_DB:-cappycloud}
      PIPELINE_DATABASE_URL: postgresql://${POSTGRES_USER:-cappy}:${POSTGRES_PASSWORD:-cappypass}@postgres:5432/${POSTGRES_DB:-cappycloud}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_jwt_secret_64_hex}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      SANDBOX_HOST: cappycloud-sandbox
      SANDBOX_GRPC_PORT: ${SANDBOX_GRPC_PORT:-50051}
      SANDBOX_SESSION_PORT: "8080"
      SANDBOX_IDLE_TIMEOUT: ${SANDBOX_IDLE_TIMEOUT:-1800}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      REDIS_URL: redis://redis:6379
    networks:
      - cappycloud_net
    ports:
      - "${API_PORT:-38000}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sandbox:
        condition: service_started

  # web roda localmente com `pnpm dev` (não usa Docker)

volumes:
  postgres_data:
  redis_data:
  repos_data:

networks:
  cappycloud_net:
    name: cappycloud_net
    driver: bridge
