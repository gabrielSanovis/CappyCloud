repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
        files: ^services/api/
      - id: ruff-format
        files: ^services/api/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: \.patch$
      - id: trailing-whitespace
        exclude: \.patch$
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: max-file-length
        name: "Máximo 300 linhas por arquivo"
        entry: python scripts/check_file_length.py
        language: system
        types_or: [python, ts, tsx, javascript, jsx]
        exclude: ^web/
